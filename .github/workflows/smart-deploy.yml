name: Smart Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Принудительно пересобрать все образы (без кеша)'
        required: false
        type: boolean
        default: false
      skip_tests:
        description: 'Пропустить проверку здоровья сервисов'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Deploy to server
      shell: powershell
      timeout-minutes: 15
      run: |
        # Устанавливаем переменную окружения для исправления ошибки
        $env:DOCKER_BUILDKIT = "1"
        $env:COMPOSE_DOCKER_CLI_BUILD = "1"

        # Устанавливаем кодировку для корректной работы с кириллицей
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8

        # Определяем команду docker compose
        if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
          $COMPOSE_CMD = "docker-compose"
          Write-Host "Используем docker-compose"
        } else {
          $COMPOSE_CMD = "docker compose"
          Write-Host "Используем docker compose"
        }

        Write-Host "Starting full deployment with complete rebuild..."

        # Полностью останавливаем все сервисы
        try {
          Invoke-Expression "$COMPOSE_CMD down --remove-orphans --timeout 30"
          Write-Host "Services stopped successfully"
        } catch {
          $errorMsg = $_.Exception.Message
          Write-Host "Warning: Error stopping services: ${errorMsg}"
          # Принудительно убиваем контейнеры
          docker ps -q | ForEach-Object { docker stop $_ }
          docker ps -aq | ForEach-Object { docker rm $_ }
        }

        # Полная пересборка всех образов без кеша
        Write-Host "Rebuilding all images without cache..."
        
        # Проверяем необходимость принудительной пересборки
        $forceRebuild = "${{ github.event.inputs.force_rebuild }}" -eq "true"
        
        if ($forceRebuild) {
          Write-Host "Force rebuild enabled - using --no-cache"
          $buildArgs = "--no-cache --parallel"
        } else {
          Write-Host "Using cache for faster build"
          $buildArgs = "--parallel"
        }
        
        try {
          Invoke-Expression "$COMPOSE_CMD build $buildArgs"
          Write-Host "All images built successfully"
        } catch {
          $errorMsg = $_.Exception.Message
          Write-Host "Error building images: ${errorMsg}"
          exit 1
        }

        # Запускаем все сервисы
        Write-Host "Starting all services..."
        $services = @("economy", "users", "directories", "warehouse", "showcase", "requests", "finance", "uex", "settings", "caddy", "postgres")
        
        foreach ($service in $services) {
          Write-Host "Starting $service..."
          try {
            Invoke-Expression "$COMPOSE_CMD up -d $service"
            Write-Host "$service started successfully"
            
            # Ждем запуска сервиса с таймаутом
            if ($service -ne "caddy" -and $service -ne "postgres") {
              Write-Host "Waiting for $service to start..."
              Start-Sleep -Seconds 5
            }
          } catch {
            $errorMsg = $_.Exception.Message
            Write-Host "Error starting ${service}: ${errorMsg}"
            exit 1
          }
        }

        # Проверяем состояние сервисов
        Write-Host "Checking service status..."
        $status = Invoke-Expression "$COMPOSE_CMD ps"
        Write-Host $status
        
        # Дополнительная проверка здоровья критичных сервисов
        $skipTests = "${{ github.event.inputs.skip_tests }}" -eq "true"
        
        if (-not $skipTests) {
          Write-Host "Checking critical services health..."
          $healthChecks = @("economy", "postgres")
          
          foreach ($service in $healthChecks) {
            Write-Host "Checking $service health..."
            try {
              $health = docker ps --filter "name=${service}_service" --format "{{.Status}}"
              if ($health -match "healthy" -or $health -match "Up") {
                Write-Host "$service is healthy"
              } else {
                Write-Host "Warning: $service may not be fully ready"
              }
            } catch {
              Write-Host "Warning: Could not check $service health"
            }
          }
        } else {
          Write-Host "Skipping health checks as requested"
        }

        # Очищаем старые образы и контейнеры
        Write-Host "Cleaning up old images..."
        docker system prune -f
        docker container prune -f

        Write-Host "Full deployment completed successfully!"
