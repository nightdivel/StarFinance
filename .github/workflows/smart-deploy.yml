name: Smart Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Принудительно пересобрать все образы'
        required: false
        type: boolean
        default: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      docker: ${{ steps.changes.outputs.docker }}
      database: ${{ steps.changes.outputs.database }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Get changed files
      id: changes
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
          echo "force_rebuild=true" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "frontend=true" >> $GITHUB_OUTPUT
          echo "backend=true" >> $GITHUB_OUTPUT
          echo "docker=true" >> $GITHUB_OUTPUT
          echo "database=true" >> $GITHUB_OUTPUT
        else
          # Получаем измененные файлы
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES"
          
          # Определяем типы изменений
          FRONTEND_CHANGED=false
          BACKEND_CHANGED=false
          DOCKER_CHANGED=false
          DATABASE_CHANGED=false
          
          while IFS= read -r file; do
            case "$file" in
              "frontend/"*|*.jsx|*.js|*.css|*.html)
                FRONTEND_CHANGED=true
                ;;
              "backend/services/"*|"backend/middleware/"*|"backend/config/"*|"backend/db.js"|"backend/package.json")
                BACKEND_CHANGED=true
                ;;
              "Dockerfile"|".dockerignore"|"docker-compose.yml"|"Caddyfile")
                DOCKER_CHANGED=true
                ;;
              "backend/migrations/"*)
                DATABASE_CHANGED=true
                ;;
            esac
          done <<< "$CHANGED_FILES"
          
          echo "frontend=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "backend=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "docker=$DOCKER_CHANGED" >> $GITHUB_OUTPUT
          echo "database=$DATABASE_CHANGED" >> $GITHUB_OUTPUT
        fi

  deploy:
    name: Deploy Changes
    runs-on: [self-hosted]
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to server
      shell: powershell
      run: |
        # Определяем команду docker compose
        if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
          $COMPOSE_CMD = "docker-compose"
          Write-Host "Используем docker-compose"
        } else {
          $COMPOSE_CMD = "docker compose"
          Write-Host "Используем docker compose"
        }
        
        # Определяем какие сервисы нужно обновить
        $SERVICES_TO_UPDATE = ""
        
        if ("${{ needs.detect-changes.outputs.frontend }}" -eq "true") {
          $SERVICES_TO_UPDATE += " economy"
        }
        
        if ("${{ needs.detect-changes.outputs.backend }}" -eq "true") {
          $SERVICES_TO_UPDATE += " users directories warehouse showcase requests finance uex settings"
        }
        
        if ("${{ needs.detect-changes.outputs.docker }}" -eq "true") {
          $SERVICES_TO_UPDATE += " caddy"
        }
        
        if ("${{ needs.detect-changes.outputs.database }}" -eq "true") {
          $SERVICES_TO_UPDATE += " postgres"
        }
        
        Write-Host "🔄 Обновляем сервисы: $SERVICES_TO_UPDATE"
        
        # Останавливаем все сервисы перед обновлением
        Invoke-Expression "$COMPOSE_CMD down --remove-orphans"
        
        # Если есть изменения в Docker файлах, пересобираем все образы
        if ("${{ needs.detect-changes.outputs.docker }}" -eq "true" -or "${{ github.event.inputs.force_rebuild }}" -eq "true") {
          Write-Host "🔨 Пересобираем все образы..."
          Invoke-Expression "$COMPOSE_CMD build --no-cache"
        } else {
          Write-Host "🔨 Пересобираем только измененные сервисы..."
          $services = $SERVICES_TO_UPDATE -split ' ' | Where-Object { $_ -ne "" }
          foreach ($service in $services) {
            if ($service -ne "postgres" -and $service -ne "caddy") {
              Invoke-Expression "$COMPOSE_CMD build $service"
            }
          }
        }
        
        # Перезапускаем только нужные сервисы
        $services = $SERVICES_TO_UPDATE -split ' ' | Where-Object { $_ -ne "" }
        foreach ($service in $services) {
          Write-Host "🔄 Перезапускаем $service..."
          Invoke-Expression "$COMPOSE_CMD up -d $service"
          
          # Ждем запуска сервиса
          if ($service -ne "caddy" -and $service -ne "postgres") {
            Start-Sleep -Seconds 10
          }
        }
        
        # Если были изменения в БД, применяем миграции
        if ("${{ needs.detect-changes.outputs.database }}" -eq "true") {
          Write-Host "🗄️ Применяем миграции базы данных..."
          try {
            Invoke-Expression "$COMPOSE_CMD exec postgres psql -U postgres -d starfinance -c `"SELECT 1;`""
          } catch {
            Write-Error "Ошибка подключения к базе данных"
            exit 1
          }
        }
        
        # Проверяем состояние
        Invoke-Expression "$COMPOSE_CMD ps"
        
        # Очищаем старые образы и контейнеры
        docker system prune -f
        docker container prune -f
        
        Write-Host "✅ Деплой завершен!"
