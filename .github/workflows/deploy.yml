# .github/workflows/deploy.yml
name: Deploy StarFinance

on:
  push:
    branches:
      - main # или любая другая ветка для деплоя
  workflow_dispatch: # Разрешить запуск вручную

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
    - name: Add server to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.PORT }}
        script: |
          # Переходим в директорию проекта
          cd c:\StarFinanceProject\StarFinance_v2
          
          # Выкачиваем последние изменения
          git fetch origin
          git checkout main
          git pull origin main
          
          # Останавливаем и пересобираем контейнеры
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d
          
          # Очищаем старые образы
          docker system prune -f
          
          echo "Deployment completed!"