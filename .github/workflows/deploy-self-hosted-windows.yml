name: Deploy to Docker on Self-Hosted Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (Windows Runner)
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        shell: powershell
        run: |
          docker --version
          if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
            docker-compose version
          } else {
            docker compose version
          }

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
            docker-compose down
            docker-compose up -d --build
          } else {
            docker compose down
            docker compose up -d --build
          }

      - name: Prune unused images
        shell: powershell
        run: docker image prune -f
