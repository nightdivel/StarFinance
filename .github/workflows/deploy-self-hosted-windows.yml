name: Deploy to Docker on Self-Hosted Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (Windows Runner)
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        shell: pwsh
        run: |
          docker --version
          docker compose version

      - name: Deploy with Docker Compose
        shell: pwsh
        run: |
          docker compose down
          docker compose up -d --build

      - name: Prune unused images
        shell: pwsh
        run: docker image prune -f
