name: Deploy to Docker on Self-Hosted Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (Windows Runner)
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        shell: powershell
        run: |
          docker --version
          if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
            docker-compose version
          } else {
            docker compose version
          }

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
            docker-compose down --remove-orphans
            if ($LASTEXITCODE -ne 0) { Write-Host "docker-compose down failed (ignored)" }
            docker rm -f economy_db economy_caddy economy_app users_service directories_service warehouse_service showcase_service requests_service finance_service uex_service settings_service 2>$null
            docker-compose up -d --build
          } else {
            docker compose down --remove-orphans
            if ($LASTEXITCODE -ne 0) { Write-Host "docker compose down failed (ignored)" }
            docker rm -f economy_db economy_caddy economy_app users_service directories_service warehouse_service showcase_service requests_service finance_service uex_service settings_service 2>$null
            docker compose up -d --build
          }

      - name: Prune unused images
        shell: powershell
        run: docker image prune -f
