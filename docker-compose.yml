services:
  economy:
    build: .
    image: starfinance_v2-economy
    container_name: economy_app
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  users:
    image: starfinance_v2-economy
    container_name: users_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/users/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  directories:
    image: starfinance_v2-economy
    container_name: directories_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/directories/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  warehouse:
    image: starfinance_v2-economy
    container_name: warehouse_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/warehouse/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  showcase:
    image: starfinance_v2-economy
    container_name: showcase_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/showcase/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  requests:
    image: starfinance_v2-economy
    container_name: requests_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/requests/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  finance:
    image: starfinance_v2-economy
    container_name: finance_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/finance/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  uex:
    image: starfinance_v2-economy
    container_name: uex_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/uex/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  settings:
    image: starfinance_v2-economy
    container_name: settings_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
      ECONOMY_BASE_URL: http://economy:3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: starfinance
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: ["sh", "-c", "cd backend && node services/settings/server.js"]
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: economy_caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - economy
      - users
      - directories
      - warehouse
      - showcase
      - requests
      - finance
      - uex
      - settings

  postgres:
    image: postgres:15
    container_name: economy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: starfinance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Moscow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starfinance"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
  caddy_data:
  caddy_config:
